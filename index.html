<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChromaFlux | Bilinear Palette Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #d1d5db;
        }

        .font-mono {
            font-family: 'JetBrains+Mono', monospace;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1a1a1a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            background: #ffffff;
            cursor: pointer;
            border-radius: 50%;
        }

        .grid-container {
            width: min(65vmin, 450px);
            height: min(65vmin, 450px);
        }

        .toast-active {
            opacity: 1 !important;
            transform: translate(-50%, 0) !important;
        }
    </style>
</head>
<body class="h-screen overflow-hidden select-none">

    <!-- Background Ambience -->
    <div class="absolute inset-0 pointer-events-none opacity-20">
        <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-blue-900 blur-[120px] rounded-full mix-blend-screen animate-pulse"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-purple-900 blur-[120px] rounded-full mix-blend-screen animate-pulse" style="animation-delay: 2s"></div>
    </div>

    <!-- Header -->
    <header class="w-full max-w-4xl mx-auto p-4 md:p-6 flex justify-between items-center z-20 relative shrink-0">
        <div class="flex flex-col">
            <h1 class="text-xl font-bold tracking-widest text-white uppercase flex items-center gap-2">
                <span class="w-3 h-3 bg-gradient-to-br from-green-400 to-blue-500 rounded-full inline-block"></span>
                Chroma<span class="text-gray-500">Flux</span>
            </h1>
            <p class="text-[10px] text-gray-600 font-mono mt-1 hidden sm:block uppercase tracking-tighter">
                Bilinear Interpolation Engine
            </p>
        </div>

        <div class="flex items-center gap-2 sm:gap-4">
            <button id="saveBtn" class="group flex items-center gap-2 bg-gray-900 hover:bg-pink-900/20 text-gray-400 hover:text-pink-500 border border-gray-800 hover:border-pink-500/50 px-4 py-2.5 rounded-full transition-all duration-200 active:scale-95">
                <i data-lucide="heart" class="w-5 h-5 group-hover:fill-pink-500"></i>
                <span class="hidden sm:inline text-xs font-bold uppercase tracking-wider">Save</span>
            </button>

            <div class="h-6 w-px bg-gray-800 mx-1"></div>

            <button id="collectionsBtn" class="p-2.5 rounded-full bg-gray-900 hover:bg-gray-800 text-gray-400 border border-transparent transition-all duration-200">
                <i data-lucide="download" class="w-5 h-5"></i>
            </button>

            <button id="randomBtn" class="p-2.5 bg-gray-900 hover:bg-white hover:text-black text-white border border-gray-800 hover:border-white rounded-full transition-all duration-200 active:scale-95 group shadow-lg">
                <i data-lucide="refresh-cw" class="w-5 h-5 group-hover:rotate-180 transition-transform duration-500"></i>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 w-full max-w-5xl mx-auto flex flex-col items-center justify-evenly relative z-10 p-2 overflow-hidden">
        
        <!-- Toast Notification -->
        <div id="toast" class="fixed top-24 left-1/2 -translate-x-1/2 z-50 opacity-0 translate-y-4 transition-all duration-300 pointer-events-none">
            <div class="bg-white/10 backdrop-blur-md border border-white/20 text-white px-4 py-2 rounded-full flex items-center gap-2 shadow-2xl">
                <div class="bg-green-500 rounded-full p-0.5"><i data-lucide="check" class="w-3 h-3 text-black"></i></div>
                <span id="toastText" class="text-xs font-bold uppercase tracking-wider">Palette Saved</span>
            </div>
        </div>

        <!-- Grid Container -->
        <div id="gridWrapper" class="relative bg-black/40 p-3 rounded-3xl shadow-2xl border border-gray-800/50 backdrop-blur-xl transition-all duration-500 shrink-0">
            <div id="colorGrid" class="grid-container grid rounded-2xl overflow-hidden cursor-crosshair relative group">
                <!-- Cells generated by JS -->
            </div>
            
            <!-- Tooltip -->
            <div class="absolute -bottom-12 left-1/2 -translate-x-1/2 h-10 flex items-center justify-center pointer-events-none whitespace-nowrap">
                <div id="tooltip" class="flex flex-col items-center opacity-0 transition-opacity duration-200">
                    <span id="tooltipHex" class="text-2xl font-bold text-white tracking-tighter"></span>
                    <span id="copyMsg" class="text-[10px] text-green-400 font-mono tracking-widest uppercase mt-1 hidden">Copied</span>
                </div>
                <div id="tooltipPlaceholder" class="text-gray-700 text-xs font-medium animate-pulse">Hover cells / Click corners</div>
            </div>
        </div>

        <!-- Controls -->
        <div class="w-full max-w-sm flex flex-col gap-4 px-4 shrink-0 pb-4">
            <div class="flex flex-col gap-1">
                <label for="projectName" class="text-[10px] text-gray-500 font-mono uppercase tracking-widest">Project Name</label>
                <input id="projectName" type="text" value="Mindful No. 001" class="w-full bg-transparent border-b border-gray-800 text-sm py-2 focus:outline-none focus:border-white transition-colors text-gray-300 font-medium">
            </div>

            <div class="flex flex-col gap-2">
                <div class="flex justify-between">
                    <label for="gridDensity" class="text-[10px] text-gray-500 font-mono uppercase tracking-widest">Resolution</label>
                    <span id="densityVal" class="text-[10px] text-gray-500 font-mono">12x12</span>
                </div>
                <input id="gridDensity" type="range" min="4" max="24" value="12" class="w-full h-1 bg-gray-800 rounded-lg appearance-none cursor-pointer accent-white">
            </div>
        </div>
    </main>

    <!-- Sidebar -->
    <div id="sidebar" class="fixed top-0 right-0 h-full w-80 bg-[#0f0f0f] border-l border-white/5 shadow-2xl z-50 translate-x-full transition-transform duration-500 ease-out">
        <div class="p-6 h-full flex flex-col">
            <div class="flex justify-between items-center mb-8 text-white">
                <h2 class="text-sm font-bold uppercase tracking-widest">Collections</h2>
                <button id="closeSidebar" class="text-gray-500 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div id="paletteList" class="flex-1 overflow-y-auto space-y-4 pr-2 custom-scrollbar">
                <!-- Saved palettes generated by JS -->
            </div>
        </div>
    </div>

    <script>
        // --- DATA & STATE ---
        let corners = { tl: '#e8f5c8', tr: '#b4f8c8', bl: '#bfd7ea', br: '#05c793' };
        let gridSize = 12;
        let savedPalettes = [];

        // --- ELEMENTS ---
        const colorGrid = document.getElementById('colorGrid');
        const gridWrapper = document.getElementById('gridWrapper');
        const densityInput = document.getElementById('gridDensity');
        const densityVal = document.getElementById('densityVal');
        const nameInput = document.getElementById('projectName');
        const tooltip = document.getElementById('tooltip');
        const tooltipHex = document.getElementById('tooltipHex');
        const tooltipPlaceholder = document.getElementById('tooltipPlaceholder');
        const copyMsg = document.getElementById('copyMsg');
        const toast = document.getElementById('toast');
        const sidebar = document.getElementById('sidebar');
        const paletteList = document.getElementById('paletteList');

        // --- UTILS ---
        const hexToRgb = (hex) => {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : { r: 0, g: 0, b: 0 };
        };
        const rgbToHex = (r, g, b) => `#${Math.round(r).toString(16).padStart(2, '0')}${Math.round(g).toString(16).padStart(2, '0')}${Math.round(b).toString(16).padStart(2, '0')}`;
        const lerp = (start, end, t) => start * (1 - t) + end * t;
        const interpolateColor = (c1, c2, t) => {
            const r1 = hexToRgb(c1), r2 = hexToRgb(c2);
            return rgbToHex(lerp(r1.r, r2.r, t), lerp(r1.g, r2.g, t), lerp(r1.b, r2.b, t));
        };
        const randomHex = () => {
            const h = Math.floor(Math.random() * 360);
            const s = 60 + Math.random() * 30, l = 40 + Math.random() * 30;
            const a = s * Math.min(l / 100, 1 - l / 100) / 100;
            const f = n => {
                const k = (n + h / 30) % 12;
                const color = (l / 100) - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
                return Math.round(255 * color).toString(16).padStart(2, '0');
            };
            return `#${f(0)}${f(8)}${f(4)}`;
        };

        // --- LOGIC ---
        function render() {
            colorGrid.innerHTML = '';
            colorGrid.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            
            gridWrapper.style.boxShadow = `0 25px 50px -12px ${corners.bl}20, 0 0 100px -30px ${corners.tr}20`;

            for (let y = 0; y < gridSize; y++) {
                const yT = y / (gridSize - 1);
                const left = interpolateColor(corners.tl, corners.bl, yT);
                const right = interpolateColor(corners.tr, corners.br, yT);

                for (let x = 0; x < gridSize; x++) {
                    const xT = x / (gridSize - 1);
                    const finalHex = interpolateColor(left, right, xT);
                    
                    const cell = document.createElement('div');
                    cell.className = 'relative w-full h-full transition-transform duration-75 hover:scale-110 hover:z-20 hover:rounded-sm';
                    cell.style.backgroundColor = finalHex;
                    
                    cell.addEventListener('mouseenter', () => {
                        tooltipPlaceholder.style.display = 'none';
                        tooltip.style.opacity = '1';
                        tooltipHex.innerText = finalHex.toUpperCase();
                        tooltipHex.style.textShadow = `0 0 20px ${finalHex}`;
                    });

                    cell.addEventListener('click', () => {
                        const el = document.createElement('textarea');
                        el.value = finalHex;
                        document.body.appendChild(el);
                        el.select();
                        document.execCommand('copy');
                        document.body.removeChild(el);
                        copyMsg.style.display = 'block';
                        setTimeout(() => copyMsg.style.display = 'none', 1500);
                    });

                    // Corners
                    const isCorner = (x === 0 && y === 0) ? 'tl' : (x === gridSize - 1 && y === 0) ? 'tr' : (x === 0 && y === gridSize - 1) ? 'bl' : (x === gridSize - 1 && y === gridSize - 1) ? 'br' : null;
                    if (isCorner) {
                        const anchor = document.createElement('div');
                        anchor.className = 'absolute inset-0 flex items-center justify-center pointer-events-none';
                        anchor.innerHTML = `<div class="w-3 h-3 bg-white rounded-full shadow-lg ring-2 ring-black/20 transform scale-75 group-hover:scale-125 transition-transform"></div>`;
                        
                        const input = document.createElement('input');
                        input.type = 'color';
                        input.className = 'pointer-events-auto absolute inset-0 opacity-0 cursor-pointer w-full h-full';
                        input.value = corners[isCorner];
                        input.addEventListener('input', (e) => {
                            corners[isCorner] = e.target.value;
                            render();
                        });
                        anchor.appendChild(input);
                        cell.appendChild(anchor);
                    }
                    colorGrid.appendChild(cell);
                }
            }
        }

        function randomize() {
            corners = { tl: randomHex(), tr: randomHex(), bl: randomHex(), br: randomHex() };
            nameInput.value = `Mindful No. ${Math.floor(Math.random() * 999)}`;
            render();
        }

        function save() {
            const p = { id: Date.now(), name: nameInput.value, corners: { ...corners } };
            savedPalettes.unshift(p);
            toast.classList.add('toast-active');
            setTimeout(() => toast.classList.remove('toast-active'), 2500);
            updateCollections();
        }

        function updateCollections() {
            paletteList.innerHTML = savedPalettes.length ? '' : '<div class="text-center text-gray-700 mt-10 text-sm border border-dashed border-gray-800 rounded-xl p-8"><i data-lucide="heart" class="mx-auto mb-2 opacity-20"></i>No saved palettes yet.</div>';
            savedPalettes.forEach(p => {
                const item = document.createElement('div');
                item.className = 'group relative bg-gray-900/50 rounded-xl p-3 border border-transparent hover:border-gray-700 transition-all cursor-pointer';
                item.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-xs font-medium text-gray-300">${p.name}</span>
                        <button class="del-btn text-gray-700 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                    </div>
                    <div class="grid grid-cols-2 gap-1 rounded-lg overflow-hidden h-20 opacity-80 group-hover:opacity-100 transition-opacity">
                        <div style="background: ${p.corners.tl}"></div><div style="background: ${p.corners.tr}"></div>
                        <div style="background: ${p.corners.bl}"></div><div style="background: ${p.corners.br}"></div>
                    </div>
                `;
                item.addEventListener('click', (e) => {
                    if (e.target.closest('.del-btn')) {
                        savedPalettes = savedPalettes.filter(x => x.id !== p.id);
                        updateCollections();
                        return;
                    }
                    corners = { ...p.corners };
                    nameInput.value = p.name;
                    sidebar.classList.add('translate-x-full');
                    render();
                });
                paletteList.appendChild(item);
            });
            lucide.createIcons();
        }

        // --- EVENTS ---
        document.getElementById('randomBtn').addEventListener('click', randomize);
        document.getElementById('saveBtn').addEventListener('click', save);
        document.getElementById('collectionsBtn').addEventListener('click', () => sidebar.classList.toggle('translate-x-full'));
        document.getElementById('closeSidebar').addEventListener('click', () => sidebar.classList.add('translate-x-full'));
        
        densityInput.addEventListener('input', (e) => {
            gridSize = parseInt(e.target.value);
            densityVal.innerText = `${gridSize}x${gridSize}`;
            render();
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && document.activeElement.tagName !== 'INPUT') {
                e.preventDefault();
                randomize();
            }
        });

        // --- INIT ---
        lucide.createIcons();
        render();
    </script>
</body>
</html>
