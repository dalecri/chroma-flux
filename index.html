<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ChromaFlux | iOS Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            /* Aggressively disable bounce scroll */
            overscroll-behavior: none;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* Hide Scrollbars entirely for native feel */
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        /* Native iOS Range Slider */
        input[type="range"] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,0,0,0.1);
            margin-top: -10px;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }

        /* Safe Areas for notch/home bar */
        .safe-pt { padding-top: max(env(safe-area-inset-top), 16px); }
        .safe-pb { padding-bottom: max(env(safe-area-inset-bottom), 20px); }

        /* Active Cell Feedback */
        .active-cell {
            z-index: 30;
            transform: scale(1.08);
            border-radius: 8px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
        }

        /* Top Dropdown Toast */
        @keyframes dropDown {
            0% { transform: translate(-50%, -120%); opacity: 0; }
            100% { transform: translate(-50%, 0); opacity: 1; }
        }
        .toast-active {
            display: flex !important;
            animation: dropDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<!-- fixed inset-0 completely destroys any chance of body scrolling -->
<body class="fixed inset-0 w-full bg-black text-gray-200 select-none touch-none flex justify-center">

    <!-- Mobile App Container (Clamped to iPhone Pro Max width) -->
    <div class="w-full max-w-[430px] h-full flex flex-col relative bg-[#050505] shadow-[0_0_50px_rgba(0,0,0,0.8)] sm:border-x sm:border-white/10 overflow-hidden">
        
        <!-- Ambient Background -->
        <div class="absolute inset-0 pointer-events-none opacity-20 z-0">
            <div class="absolute top-0 left-[-20%] w-[100%] h-[50%] bg-blue-600/30 blur-[100px] rounded-full mix-blend-screen animate-pulse"></div>
            <div class="absolute bottom-0 right-[-20%] w-[100%] h-[50%] bg-purple-600/30 blur-[100px] rounded-full mix-blend-screen animate-pulse" style="animation-delay: 2s"></div>
        </div>

        <!-- iOS Style Header -->
        <header class="w-full flex justify-center items-center safe-pt pb-3 z-40 bg-[#1c1c1e]/80 backdrop-blur-2xl border-b border-white/10 shrink-0">
            <input 
                id="projectName" 
                type="text" 
                value="Palette #E8F5C8" 
                class="bg-transparent border-none outline-none text-sm font-semibold text-center text-white placeholder-gray-500 w-48 mt-1"
                autocomplete="off"
            >
        </header>

        <!-- Main Viewport (Grid) -->
        <main class="flex-1 flex flex-col items-center justify-center relative z-10 w-full min-h-0 px-4">
            
            <!-- Contextual Color Info (Floats above grid) -->
            <div id="tooltip" class="absolute top-6 left-1/2 -translate-x-1/2 bg-[#1c1c1e]/90 backdrop-blur-xl px-5 py-2.5 rounded-full opacity-0 transition-all duration-300 flex items-center gap-3 z-50 pointer-events-none shadow-xl border border-white/10">
                <div class="w-4 h-4 rounded-full shadow-inner border border-white/20" id="tooltipColorIndicator"></div>
                <span id="tooltipHex" class="text-sm font-mono font-bold text-white tracking-widest">#FFFFFF</span>
            </div>

            <!-- The Grid -->
            <div id="gridWrapper" class="w-full aspect-square relative transition-all duration-700">
                <div id="colorGrid" class="w-full h-full grid rounded-3xl overflow-hidden shadow-2xl relative border border-white/5">
                    <!-- JS Populated -->
                </div>
            </div>
            
            <p class="text-[10px] font-medium text-gray-500 uppercase tracking-widest mt-8">Tap to Copy Hex</p>
        </main>

        <!-- iOS Style Bottom Tab Bar -->
        <footer class="w-full bg-[#1c1c1e]/80 backdrop-blur-2xl border-t border-white/10 safe-pb pt-4 px-6 z-40 flex flex-col gap-5 shrink-0">
            
            <!-- Density Control -->
            <div class="flex items-center gap-4 px-2">
                <i data-lucide="grid-2x2" class="w-5 h-5 text-gray-400 shrink-0"></i>
                <input id="gridDensity" type="range" min="4" max="16" value="4" class="flex-1">
                <span id="densityVal" class="text-xs font-mono font-medium text-gray-400 w-8 text-right shrink-0">4x4</span>
            </div>

            <!-- Tab Actions -->
            <div class="flex justify-between items-center px-4 pb-2">
                <button id="randomBtn" class="flex flex-col items-center gap-1.5 text-gray-400 active:text-white transition-colors p-2" aria-label="Randomize">
                    <i data-lucide="shuffle" class="w-6 h-6"></i>
                    <span class="text-[10px] font-medium">Random</span>
                </button>

                <button id="saveBtn" class="flex flex-col items-center gap-1.5 text-gray-400 active:text-pink-400 transition-colors p-2" aria-label="Save">
                    <i data-lucide="heart" class="w-6 h-6"></i>
                    <span class="text-[10px] font-medium">Save</span>
                </button>

                <button id="collectionsBtn" class="flex flex-col items-center gap-1.5 text-gray-400 active:text-blue-400 transition-colors p-2" aria-label="Studio">
                    <i data-lucide="layers" class="w-6 h-6"></i>
                    <span class="text-[10px] font-medium">Studio</span>
                </button>
            </div>
        </footer>

        <!-- Native iOS Style Bottom Sheet -->
        <div id="sheetBackdrop" class="absolute inset-0 bg-black/60 backdrop-blur-sm z-[45] opacity-0 pointer-events-none transition-opacity duration-300"></div>
        
        <div id="sidebar" class="absolute bottom-0 inset-x-0 bg-[#151515] rounded-t-[2.5rem] shadow-[0_-10px_50px_rgba(0,0,0,0.8)] z-50 transform translate-y-full transition-transform duration-400 ease-[cubic-bezier(0.32,0.72,0,1)] flex flex-col h-[80dvh]">
            <!-- Drag Handle -->
            <div class="w-12 h-1.5 bg-white/20 rounded-full mx-auto mt-4 shrink-0"></div>
            
            <div class="px-6 py-4 flex justify-between items-center border-b border-white/5 shrink-0">
                <h2 class="text-sm font-bold text-white tracking-wide">Saved Palettes</h2>
                <button id="closeSidebar" class="p-2 bg-white/10 rounded-full text-gray-300 active:scale-90 transition-transform"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            
            <!-- List (Internal Scroll allowed) -->
            <div id="paletteList" class="flex-1 overflow-y-auto p-4 space-y-3 pb-[env(safe-area-inset-bottom)] -webkit-overflow-scrolling-touch">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- iOS Style Top Notification -->
        <div id="toast" class="absolute safe-pt top-4 left-1/2 -translate-x-1/2 z-[100] hidden w-[90%] max-w-[340px]">
            <div class="bg-[#2c2c2e]/95 backdrop-blur-xl text-white px-4 py-3 rounded-2xl flex items-center gap-3 shadow-2xl border border-white/10">
                <div class="bg-green-500 rounded-full p-1.5 shrink-0"><i data-lucide="check" class="w-3.5 h-3.5 text-white"></i></div>
                <span id="toastText" class="text-sm font-semibold tracking-wide">Copied to Clipboard</span>
            </div>
        </div>

    </div>

    <script>
        // --- DATA & STATE ---
        let corners = { tl: '#9333ea', tr: '#3b82f6', bl: '#10b981', br: '#f59e0b' };
        let gridSize = 4;
        let savedPalettes = JSON.parse(localStorage.getItem('chromaflux_saves') || '[]');

        const colorGrid = document.getElementById('colorGrid');
        const gridWrapper = document.getElementById('gridWrapper');
        const densityInput = document.getElementById('gridDensity');
        const densityVal = document.getElementById('densityVal');
        const nameInput = document.getElementById('projectName');
        
        const tooltip = document.getElementById('tooltip');
        const tooltipHex = document.getElementById('tooltipHex');
        const tooltipColorIndicator = document.getElementById('tooltipColorIndicator');
        
        const sidebar = document.getElementById('sidebar');
        const sheetBackdrop = document.getElementById('sheetBackdrop');
        const paletteList = document.getElementById('paletteList');
        const toast = document.getElementById('toast');

        // --- MATH UTILS ---
        const hexToRgb = (hex) => {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : { r: 0, g: 0, b: 0 };
        };
        const rgbToHex = (r, g, b) => `#${[r, g, b].map(x => Math.round(Math.max(0, Math.min(255, x))).toString(16).padStart(2, '0')).join('')}`;
        const lerp = (start, end, t) => start * (1 - t) + end * t;
        const interpolateColor = (c1, c2, t) => {
            const r1 = hexToRgb(c1), r2 = hexToRgb(c2);
            return rgbToHex(lerp(r1.r, r2.r, t), lerp(r1.g, r2.g, t), lerp(r1.b, r2.b, t));
        };
        const randomHex = () => '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');

        // --- RENDER ---
        function render() {
            colorGrid.innerHTML = '';
            colorGrid.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            
            // Soft atmospheric glow behind the grid
            gridWrapper.style.boxShadow = `0 30px 80px -20px ${corners.bl}40, 0 10px 40px -10px ${corners.tr}30`;

            for (let y = 0; y < gridSize; y++) {
                const yT = y / (gridSize - 1);
                const left = interpolateColor(corners.tl, corners.bl, yT);
                const right = interpolateColor(corners.tr, corners.br, yT);

                for (let x = 0; x < gridSize; x++) {
                    const xT = x / (gridSize - 1);
                    const finalHex = interpolateColor(left, right, xT);
                    
                    const cell = document.createElement('div');
                    cell.className = 'relative w-full h-full transition-all duration-300';
                    cell.style.backgroundColor = finalHex;
                    
                    // Single Tap for iOS Feel (Select & Copy instantly)
                    const handleTap = (e) => {
                        e.preventDefault(); // Stop double-tap zoom
                        
                        // Update tooltip
                        tooltip.style.opacity = '1';
                        tooltip.style.transform = 'translate(-50%, 10px)';
                        tooltipHex.innerText = finalHex.toUpperCase();
                        tooltipColorIndicator.style.backgroundColor = finalHex;
                        
                        // Active state animation
                        document.querySelectorAll('.active-cell').forEach(c => c.classList.remove('active-cell'));
                        cell.classList.add('active-cell');

                        copyToClipboard(finalHex);
                    };

                    // Mobile touch and Desktop click
                    cell.addEventListener('touchstart', handleTap, {passive: false});
                    cell.addEventListener('mousedown', handleTap);
                    
                    // Add Corner Pickers
                    const cornerKey = (x === 0 && y === 0) ? 'tl' : 
                                      (x === gridSize-1 && y === 0) ? 'tr' : 
                                      (x === 0 && y === gridSize-1) ? 'bl' : 
                                      (x === gridSize-1 && y === gridSize-1) ? 'br' : null;
                    
                    if (cornerKey) {
                        const pickerContainer = document.createElement('div');
                        pickerContainer.className = 'absolute inset-0 flex items-center justify-center';
                        pickerContainer.innerHTML = `
                            <div class="w-8 h-8 rounded-full bg-white/20 backdrop-blur-md border border-white/40 flex items-center justify-center shadow-lg pointer-events-none">
                                <div class="w-2 h-2 bg-white rounded-full shadow-sm"></div>
                                <input type="color" class="absolute inset-0 opacity-0 cursor-pointer pointer-events-auto w-full h-full" value="${corners[cornerKey]}">
                            </div>
                        `;
                        const input = pickerContainer.querySelector('input');
                        input.addEventListener('input', (e) => {
                            corners[cornerKey] = e.target.value;
                            render();
                        });
                        
                        // Prevent tap from firing when interacting with the color picker
                        input.addEventListener('touchstart', (e) => e.stopPropagation(), {passive: false});
                        input.addEventListener('mousedown', (e) => e.stopPropagation());
                        
                        cell.appendChild(pickerContainer);
                    }

                    colorGrid.appendChild(cell);
                }
            }
        }

        let toastTimeout;
        function showToast(msg) {
            clearTimeout(toastTimeout);
            const toastText = document.getElementById('toastText');
            toastText.innerText = msg;
            
            toast.classList.remove('hidden');
            // Force reflow
            void toast.offsetWidth;
            toast.classList.add('toast-active');
            
            toastTimeout = setTimeout(() => {
                toast.classList.remove('toast-active');
                setTimeout(() => toast.classList.add('hidden'), 400); // Wait for anim
            }, 2000);
        }

        function copyToClipboard(text) {
            const el = document.createElement('textarea');
            el.value = text;
            el.style.position = 'absolute';
            el.style.left = '-9999px';
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast(`${text.toUpperCase()} Copied`);
        }

        function savePalette() {
            const p = { id: Date.now(), name: nameInput.value || 'Untitled', corners: { ...corners } };
            savedPalettes.unshift(p);
            localStorage.setItem('chromaflux_saves', JSON.stringify(savedPalettes));
            showToast("Saved to Studio");
            updateSidebar();
        }

        function updateSidebar() {
            paletteList.innerHTML = savedPalettes.length ? '' : `
                <div class="flex flex-col items-center justify-center py-20 text-gray-500 gap-3">
                    <i data-lucide="ghost" class="w-8 h-8 opacity-50"></i>
                    <p class="text-xs font-medium">No palettes saved yet.</p>
                </div>
            `;
            
            savedPalettes.forEach(p => {
                const item = document.createElement('div');
                item.className = 'bg-[#2c2c2e] rounded-2xl p-3.5 flex gap-4 items-center group active:scale-[0.98] transition-transform cursor-pointer border border-white/5';
                item.innerHTML = `
                    <div class="w-14 h-14 rounded-xl overflow-hidden grid grid-cols-2 shrink-0 shadow-inner">
                        <div style="background:${p.corners.tl}"></div><div style="background:${p.corners.tr}"></div>
                        <div style="background:${p.corners.bl}"></div><div style="background:${p.corners.br}"></div>
                    </div>
                    <div class="flex-1 min-w-0 flex flex-col justify-center">
                        <p class="text-sm font-semibold text-white truncate">${p.name}</p>
                        <p class="text-[10px] text-gray-400 font-mono mt-1">${p.corners.tl.toUpperCase()}</p>
                    </div>
                    <button class="delete-btn p-3 bg-red-500/10 rounded-full text-red-400 active:bg-red-500/20 transition-colors">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                `;
                item.addEventListener('click', (e) => {
                    if (e.target.closest('.delete-btn')) {
                        savedPalettes = savedPalettes.filter(x => x.id !== p.id);
                        localStorage.setItem('chromaflux_saves', JSON.stringify(savedPalettes));
                        updateSidebar();
                        return;
                    }
                    corners = { ...p.corners };
                    nameInput.value = p.name;
                    render();
                    toggleSidebar(false);
                });
                paletteList.appendChild(item);
            });
            lucide.createIcons();
        }

        function toggleSidebar(force) {
            const state = typeof force === 'boolean' ? force : sidebar.classList.contains('translate-y-full');
            if (state) {
                // Open
                sidebar.classList.remove('translate-y-full');
                sheetBackdrop.classList.remove('opacity-0', 'pointer-events-none');
                sheetBackdrop.classList.add('opacity-100', 'pointer-events-auto');
            } else {
                // Close
                sidebar.classList.add('translate-y-full');
                sheetBackdrop.classList.add('opacity-0', 'pointer-events-none');
                sheetBackdrop.classList.remove('opacity-100', 'pointer-events-auto');
            }
        }

        // --- EVENTS ---
        document.getElementById('randomBtn').addEventListener('click', () => {
            corners = { tl: randomHex(), tr: randomHex(), bl: randomHex(), br: randomHex() };
            nameInput.value = `Palette ${corners.tl.toUpperCase()}`;
            render();
            // Clear tooltip
            tooltip.style.opacity = '0';
            document.querySelectorAll('.active-cell').forEach(c => c.classList.remove('active-cell'));
        });

        document.getElementById('saveBtn').addEventListener('click', savePalette);
        document.getElementById('collectionsBtn').addEventListener('click', () => toggleSidebar(true));
        document.getElementById('closeSidebar').addEventListener('click', () => toggleSidebar(false));
        sheetBackdrop.addEventListener('click', () => toggleSidebar(false));

        densityInput.addEventListener('input', (e) => {
            gridSize = parseInt(e.target.value);
            densityVal.innerText = `${gridSize}x${gridSize}`;
            render();
        });

        // Hide tooltip when tapping background
        document.body.addEventListener('touchstart', (e) => {
            if (!e.target.closest('#colorGrid')) {
                tooltip.style.opacity = '0';
                document.querySelectorAll('.active-cell').forEach(c => c.classList.remove('active-cell'));
            }
        }, {passive: true});

        // --- INIT ---
        lucide.createIcons();
        render();
        updateSidebar();
    </script>
</body>
</html>
